<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BC Sports – Under Maintenance</title>
  <meta name="theme-color" content="#080808" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/jpeg" href="https://i.ibb.co/p6nRXkvK/Untitled-s1.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #e8001e;
      --dark: #080c10;
      --card: #141e2a;
      --white: #f0f4f8;
      --muted: #8294a8;
      --accent: #ff3d5a;
    }

    html,
    body {
      height: 100%;
      font-family: 'Barlow', sans-serif;
      background: var(--dark);
      color: var(--white);
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(232, 0, 30, .15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(232, 0, 30, .10) 0%, transparent 55%),
        var(--dark);
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .orb {
      position: fixed;
      z-index: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 0, 30, .35) 0%, transparent 70%);
      filter: blur(40px);
      animation: floatOrb 10s ease-in-out infinite;
    }

    .orb1 {
      width: 500px;
      height: 500px;
      top: -200px;
      left: -150px;
    }

    .orb2 {
      width: 350px;
      height: 350px;
      bottom: -100px;
      right: -100px;
      animation-delay: -5s;
    }

    @keyframes floatOrb {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(40px, 30px) scale(1.08);
      }
    }

    .wrapper {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      border: 1px solid rgba(232, 0, 30, .4);
      border-radius: 4px;
      background: rgba(232, 0, 30, .08);
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      animation: fadeDown .8s ease both;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 61, 90, .6);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(255, 61, 90, 0);
      }
    }

    .logomark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 10rem);
      line-height: .9;
      letter-spacing: .04em;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeDown .9s .15s ease both;
      user-select: none;
    }

    .logomark span {
      -webkit-text-fill-color: var(--accent);
    }

    .tagline {
      font-size: clamp(1rem, 3vw, 1.35rem);
      font-weight: 300;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 12px 0 44px;
      animation: fadeDown 1s .3s ease both;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--accent));
      border-radius: 2px;
      margin: 0 auto 44px;
      animation: scaleIn .8s .4s ease both;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      letter-spacing: .06em;
      line-height: 1.1;
      animation: fadeUp .9s .5s ease both;
    }

    h1 em {
      font-style: normal;
      -webkit-text-fill-color: var(--accent);
    }

    .subtitle {
      max-width: 540px;
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      margin: 18px auto 52px;
      animation: fadeUp .9s .65s ease both;
    }

    .footer {
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(130, 148, 168, .4);
      animation: fadeUp .9s .75s ease both;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }

    .footer a:hover {
      color: var(--accent);
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scaleX(0);
      }

      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }
  </style>
</head>

<body>

  <div class="bg"></div>
  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="wrapper">

    <div class="badge">
      <span class="badge-dot"></span>
      Maintenance in Progress
    </div>

    <div class="logomark">BC<span>Sports</span></div>
    <div class="tagline">bcsports.site</div>
    <div class="divider"></div>

    <h1>We're <em>Upgrading</em><br>the Game</h1>
    <p class="subtitle">
      Our team is working hard to bring you a better, faster sports experience.
      We'll be back in action shortly — stay tuned!
    </p>

    <div class="footer">
      &copy; 2026 <a href="https://bcsports.site">TeamCDC</a> &nbsp;&middot;&nbsp;
      <a href="">Contact Support</a>
    </div>

  </div>

  <script src="pwa-install.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("sw.js")
          .then((reg) => console.log("Service Worker registered", reg))
          .catch((err) =>
            console.error("Service Worker registration failed", err),
          );
      });
    }
  </script>
</body>

</html>
